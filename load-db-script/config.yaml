database:
  host: localhost
  port: 5432
  database: loaddb
  user: postgres
  password: password

default_import: municipios

imports:
  municipios:
    csv:
      file_path: data/small/municipios.csv
      encoding: latin1
      delimiter: ";"

    staging:
      schema: public
      table: stg_municipios
      truncate_before_load: true

    target:
      schema: public
      table: municipios
      mode: replace
      primary_key: codigo_ibge

    errors:
      schema: public
      table: import_errors

    load:
      dry_run: false
      load_only: false
      # max_rows: 100
      debug: true
      debug_every_rows: 100000

    columns:
      CÃDIGO DO MUNICÃPIO - TOM:
        target: codigo_tom
        required: true
        type: integer

      CÃDIGO DO MUNICÃPIO - IBGE:
        target: codigo_ibge
        required: true
        type: integer

      MUNICÃPIO - TOM:
        target: nombre_tom
        required: true
        transform: initcap_trim

      MUNICÃPIO - IBGE:
        target: nombre
        required: true
        transform: initcap_trim

      UF:
        target: uf
        required: true
        transform: upper_trim

