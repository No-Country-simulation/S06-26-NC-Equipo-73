csv:
  file_path: visent/small/clusters.csv
  encoding: utf8
  delimiter: ;
staging:
  schema: public
  table: stg_clusters
  truncate_before_load: true
target:
  schema: public
  table: clusters
  mode: replace
  primary_key: cluster
errors:
  schema: public
  table: import_errors
load:
  dry_run: false
  load_only: false
  debug: true
  debug_every_rows: 100000
dimensions:
  municipios:
    schema: public
    table: municipios
    key_column: codigo_ibge
    value_column: nombre
    transform: ascii_lower_trim
    lookup_transform: ascii_lower_trim
    create_table: false
    create_missing: false
columns:
  Cluster:
    target: cluster
    required: true
    transform: upper_trim
  Municipio:
    target: municipio_codigo
    required: true
    dimension: municipios
  Lat:
    target: latitud
    required: true
    type: numeric
  Lon:
    target: longitud
    required: true
    type: numeric
  Perfil:
    target: perfil
    required: true
    transform: trim
