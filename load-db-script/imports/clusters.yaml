csv:
  file_path: visent/small/clusters.csv
  encoding: utf8
  delimiter: ;
staging:
  schema: public
  table: stg_clusters
  truncate_before_load: true
  drop_after_load: true
target:
  schema: public
  table: clusters
  mode: replace
  primary_key: cluster
  skip_if_exists: true
errors:
  schema: public
  table: import_errors
load:
  dry_run: false
  load_only: false
  debug: true
  debug_every_rows: 100000
columns:
  Cluster:
    target: cluster
    required: true
    transform: upper_trim
  MunicipioCodigo:
    target: municipio_codigo
    required: true
    type: integer
    references:
      schema: public
      table: municipios
      column: codigo_ibge
  Lat:
    target: latitud
    required: true
    type: numeric
  Lon:
    target: longitud
    required: true
    type: numeric
  Perfil:
    target: perfil
    required: true
    transform: trim
