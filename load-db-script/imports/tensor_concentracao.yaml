csv:
  file_path: visent/small/tensor_concentracao.csv
  encoding: utf8
  delimiter: ","
staging:
  schema: public
  table: temporal_tensor_concentracion
  truncate_before_load: true
  drop_after_load: true
target:
  schema: public
  table: tensor_concentracion
  mode: replace
  indexes:
    - [fecha, periodo, nombre_zona]
errors:
  schema: public
  table: errores_importacion
load:
  dry_run: false
  load_only: false
  debug: true
  debug_every_rows: 100000
dimensions:
  municipios:
    schema: public
    table: municipios
    key_column: codigo_municipio_ibge
    key_type: integer
    value_column: nombre_municipio
    transform: ascii_lower_trim
    lookup_transform: ascii_lower_trim
    create_table: false
    create_missing: false
columns:
  ecgi:
    target: ecgi
    required: true
    type: bigint
    references:
      schema: public
      table: antenas
      column: ecgi
  cluster:
    target: nombre_zona
    required: true
    references:
      schema: public
      table: zonas
      column: nombre_zona
    transform: upper_trim
  municipio:
    target: codigo_municipio
    required: true
    dimension: municipios
  day_date:
    target: fecha
    required: true
    type: date
    transform: date_ymd
  periodo:
    target: periodo
    required: true
    transform: upper_trim
  n_usuarios:
    target: cantidad_usuarios
    required: true
    type: integer
    min: 0
  n_sessoes:
    target: cantidad_sesiones
    required: true
    type: integer
    min: 0
  download_bytes:
    target: bytes_descarga
    required: true
    type: bigint
    min: 0
  upload_bytes:
    target: bytes_subida
    required: true
    type: bigint
    min: 0
  dur_media_s:
    target: duracion_promedio_segundos
    required: true
    type: numeric
    min: 0
  drop_pct_medio:
    target: porcentaje_caidas_promedio
    required: true
    type: numeric
    min: 0
  congestionamento_medio:
    target: congestion_promedio
    required: true
    type: numeric
    min: 0
  chamadas_total:
    target: total_llamadas
    required: true
    type: integer
    min: 0
  mensagens_total:
    target: total_mensajes
    required: true
    type: integer
    min: 0
  lat:
    target: latitud
    required: true
    type: numeric
  lon:
    target: longitud
    required: true
    type: numeric
