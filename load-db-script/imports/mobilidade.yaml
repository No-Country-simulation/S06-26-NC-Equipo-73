csv:
  file_path: visent/large/tensor_mobilidade.csv
  encoding: utf8
  delimiter: ","
staging:
  schema: public
  table: stg_mobilidade
  truncate_before_load: true
  drop_after_load: true
target:
  schema: public
  table: mobilidade
  mode: replace
errors:
  schema: public
  table: import_errors
load:
  dry_run: false
  load_only: false
  debug: true
  debug_every_rows: 100000
dimensions:
  municipios:
    schema: public
    table: municipios
    key_column: codigo_ibge
    key_type: integer
    value_column: nombre
