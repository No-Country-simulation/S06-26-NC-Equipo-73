csv:
  file_path: visent/small/trajetos_comuns.csv
  encoding: utf8
  delimiter: ","
staging:
  schema: public
  table: temporal_trayectos_comunes
  truncate_before_load: true
  drop_after_load: true
target:
  schema: public
  table: trayectos_comunes
  mode: replace
  primary_key:
    - zona_origen
    - zona_destino
    - periodo_predominante
errors:
  schema: public
  table: errores_importacion
load:
  dry_run: false
  load_only: false
  debug: true
  debug_every_rows: 100000
dimensions:
  municipios:
    schema: public
    table: municipios
    key_column: codigo_municipio_ibge
    key_type: integer
    value_column: nombre_municipio
    transform: ascii_lower_trim
    lookup_transform: ascii_lower_trim
    create_table: false
    create_missing: false
columns:
  cluster_origem:
    target: zona_origen
    required: true
    references:
      schema: public
      table: zonas
      column: nombre_zona
    transform: upper_trim
  municipio_origem:
    target: codigo_municipio_origen
    dimension: municipios
    lookup:
      schema: public
      table: zonas
      source_column: cluster_origem
      match_column: nombre_zona
      value_column: codigo_municipio
      transform: upper_trim
      lookup_transform: upper_trim
  lat_origem:
    target: latitud_origen
    required: true
    type: numeric
  lon_origem:
    target: longitud_origen
    required: true
    type: numeric
  cluster_destino:
    target: zona_destino
    required: true
    references:
      schema: public
      table: zonas
      column: nombre_zona
    transform: upper_trim
  municipio_destino:
    target: codigo_municipio_destino
    dimension: municipios
    lookup:
      schema: public
      table: zonas
      source_column: cluster_destino
      match_column: nombre_zona
      value_column: codigo_municipio
      transform: upper_trim
      lookup_transform: upper_trim
  lat_destino:
    target: latitud_destino
    required: true
    type: numeric
  lon_destino:
    target: longitud_destino
    required: true
    type: numeric
  mesmo_cluster:
    target: misma_zona
    required: true
    type: integer
    min: 0
    max: 1
  n_usuarios:
    target: cantidad_usuarios
    required: true
    type: integer
    min: 0
  n_viagens:
    target: cantidad_viajes
    required: true
    type: integer
    min: 0
  dist_media_km:
    target: distancia_media_km
    required: true
    type: numeric
    min: 0
  periodo_predominante:
    target: periodo_predominante
    required: true
    transform: upper_trim
