csv:
  file_path: external-sources/large/RD202402.csv
  encoding: utf8
  delimiter: ;
staging:
  schema: public
  table: temporal_hospitalizaciones_febrero_2024
  truncate_before_load: true
  drop_after_load: true
target:
  schema: public
  table: hospitalizaciones_febrero_2024
  mode: replace
errors:
  schema: public
  table: errores_importacion
load:
  dry_run: false
  load_only: false
  debug: true
  debug_every_rows: 100000
columns:
  UF_ZI:
    target: codigo_gestor_territorial
    required: true
    type: integer
  ANO_CMPT:
    target: anio_competencia
    required: true
    type: integer
  MES_CMPT:
    target: mes_competencia
    required: true
    type: integer
    min: 1
    max: 12
  ESPEC:
    target: codigo_especialidad_cama
    required: true
    type: integer
    references:
      schema: public
      table: codigos_hospitalarios
      column: codigo
      where:
        variable: ESPEC
  CGC_HOSP:
    target: cnpj_hospital
    transform: trim
  N_AIH:
    target: numero_aih
    required: true
    transform: trim
  IDENT:
    target: codigo_tipo_aih
    required: true
    type: integer
    references:
      schema: public
      table: codigos_hospitalarios
      column: codigo
      where:
        variable: IDENT
  CEP:
    target: cep
    transform: trim
  MUNIC_RES:
    target: codigo_municipio_residencia
    required: true
    type: integer
    references:
      schema: public
      table: municipios
      column: codigo_municipio_ibge
      lookup_transform: ibge_without_check_digit
  NASC:
    target: fecha_nacimiento
    type: date
    transform: date_yyyymmdd
  SEXO:
