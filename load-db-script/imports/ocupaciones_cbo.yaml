csv:
  file_path: external-sources/small/CAGEDEST-OCUPACIONES.csv
  encoding: utf8
  delimiter: ;
staging:
  schema: public
  table: stg_ocupaciones_cbo
  truncate_before_load: true
target:
  schema: public
  table: ocupaciones_cbo
  mode: replace
  primary_key: codigo_ocupacion
errors:
  schema: public
  table: import_errors
load:
  dry_run: false
  load_only: false
  debug: true
  debug_every_rows: 100000
columns:
  codigo_ocupacion:
    target: codigo_ocupacion
    required: true
    transform: trim
  nombre_ocupacion:
    target: nombre_ocupacion
    required: true
    transform: initcap_trim
